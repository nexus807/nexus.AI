<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Pro</title>
    <style>
        :root {
            --bg-color: #0e1117;
            --sidebar-color: #161b22;
            --chat-bg: #0e1117;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --user-bubble: #1f6feb;
            --ai-bubble: #21262d;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        aside {
            width: 260px;
            background-color: var(--sidebar-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .new-chat-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            max-height: calc(100vh - 150px);
        }

        .history-item {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* Main Chat Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            height: 100vh;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(14, 17, 23, 0.8);
            backdrop-filter: blur(10px);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            display: flex;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message-wrapper.user {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .user .msg-avatar {
            background-color: #238636;
            color: white;
        }

        .ai .msg-avatar {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: calc(100% - 60px);
            word-wrap: break-word;
        }

        .user .bubble {
            background-color: var(--user-bubble);
            color: white;
            border-top-right-radius: 2px;
        }

        .ai .bubble {
            background-color: var(--ai-bubble);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-top-left-radius: 2px;
        }

        /* Input Area */
        .chat-input-container {
            padding: 20px 24px;
            background: linear-gradient(180deg, transparent, var(--bg-color) 40%);
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background-color: var(--ai-bubble);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: border-color 0.2s;
        }

        .input-box:focus-within {
            border-color: var(--accent-color);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            resize: none;
            outline: none;
            max-height: 150px;
            padding: 8px;
            font-family: inherit;
        }

        .send-btn {
            background-color: var(--accent-color);
            color: #0e1117;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            font-weight: bold;
        }

        .send-btn:hover {
            opacity: 0.85;
        }

        /* Responsive design for phones */
        @media (max-width: 768px) {
            aside {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar (Desktop View) -->
    <aside>
        <div class="sidebar-top">
            <button class="new-chat-btn" onclick="startNewChat()">
                <span>+</span> New chat
            </button>
            <ul class="history-list" id="history-list">
                <li class="history-item">Professional AI Assistant</li>
                <li class="history-item">GitHub Web Hosting</li>
            </ul>
        </div>
        <div class="user-profile">
            <div class="avatar">U</div>
            <span>Satya User</span>
        </div>
    </aside>

    <!-- Main Chat Window -->
    <main>
        <div class="chat-header">
            <span>AI Assistant v2.4</span>
            <span style="font-size: 0.8rem; color: var(--text-secondary);">Online & Secure</span>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message-wrapper ai">
                <div class="msg-avatar">AI</div>
                <div class="bubble">Hello! I am your advanced professional AI assistant, hosted completely live via your GitHub page. How can I assist you with your code, creativity, or project planning today?</div>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="input-box">
                <textarea id="user-input" rows="1" placeholder="Message AI Assistant..."></textarea>
                <button class="send-btn" id="send-btn">↑</button>
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const historyList = document.getElementById('history-list');

        function appendMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper', sender);

            const avatar = document.createElement('div');
            avatar.classList.add('msg-avatar');
            avatar.textContent = sender === 'user' ? 'U' : 'AI';

            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.textContent = text;

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function getAIResponse(query) {
            const q = query.toLowerCase();
            let reply = "That's an insightful inquiry. As your custom web AI, I am fully optimized to streamline solutions, format responses clearly, and adapt to whatever task you feed into this interface.";

            if (q.includes('hello') || q.includes('hi')) {
                reply = "Greetings! Systems are fully operational and ready for your command.";
            } else if (q.includes('who are you') || q.includes('what are you')) {
                reply = "I am a high-performance web-native intelligent agent running seamlessly on your live GitHub infrastructure.";
            } else if (q.includes('code') || q.includes('html') || q.includes('github')) {
                reply = "You are running this code live via GitHub Pages. You can continuously modify this file to expand my functionality or customize my styling!";
            } else if (q.includes('help')) {
                reply = "I can assist with writing code, answering technical queries, drafting documentation, or running deep analytical reasoning. What are we building next?";
            }

            // Simulate typing delay for realism
            setTimeout(() => {
                appendMessage(reply, 'ai');
            }, 700);
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';

            // Add to sidebar history mock
            if (historyList.children.length < 5) {
                const li = document.createElement('li');
                li.classList.add('history-item');
                li.textContent = text;
                historyList.prepend(li);
            }

            getAIResponse(text);
        }

        sendBtn.addEventListener('click', handleSend);
        
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function startNewChat() {
            chatMessages.innerHTML = `
                <div class="message-wrapper ai">
                    <div class="msg-avatar">AI</div>
                    <div class="bubble">Started a fresh session. What would you like to explore next?</div>
                </div>
            `;
        }
    </script>
</body>
</html>
