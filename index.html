<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus .AI</title>
    <style>
        :root {
            --bg-color: #0e1117;
            --sidebar-color: #161b22;
            --chat-bg: #0e1117;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-color: #3b82f6;
            --user-bubble: #1f6feb;
            --ai-bubble: #21262d;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Splash Screen Styling */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .splash-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 1s ease-in-out;
        }

        .splash-title {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .splash-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .continue-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
            margin: 0 auto;
        }

        .continue-btn:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        /* Main App Interface */
        #main-app {
            display: none;
            width: 100%;
            height: 100vh;
            display: flex;
        }

        aside {
            width: 260px;
            background-color: var(--sidebar-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
        }

        .new-chat-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            width: 100%;
        }

        .new-chat-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .brand-footer {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            height: 100vh;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            font-size: 1rem;
            font-weight: 600;
            background-color: rgba(14, 17, 23, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-wrapper {
            display: flex;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message-wrapper.user {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .user .msg-avatar { background-color: #238636; color: white; }
        .ai .msg-avatar { background: linear-gradient(135deg, #3b82f6, #9333ea); color: white; }

        .bubble {
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: calc(100% - 60px);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user .bubble { background-color: var(--user-bubble); color: white; }
        .ai .bubble { background-color: var(--ai-bubble); border: 1px solid var(--border-color); }

        .chat-input-container {
            padding: 20px 24px;
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--ai-bubble);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            resize: none;
            outline: none;
            max-height: 150px;
            padding: 8px;
        }

        .send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) { aside { display: none; } }
    </style>
</head>
<body>

    <!-- Welcome Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <h1 class="splash-title">Welcome to Nexus .AI</h1>
            <p class="splash-subtitle">powered by satyaX</p>
            <button class="continue-btn" onclick="enterApp()">Continue</button>
        </div>
    </div>

    <!-- Main Application UI -->
    <div id="main-app" style="display: none;">
        <aside>
            <div>
                <button class="new-chat-btn" onclick="location.reload()">+ New Session</button>
            </div>
            <div class="brand-footer">
                Nexus .AI v1.0<br>
                <span style="font-size: 0.7rem; opacity: 0.7;">powered by satyaX</span>
            </div>
        </aside>

        <main>
            <div class="chat-header">
                <span>Nexus .AI</span>
                <span style="font-size: 0.75rem; color: var(--text-secondary);">Online</span>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message-wrapper ai">
                    <div class="msg-avatar">AI</div>
                    <div class="bubble">Hello! I am Nexus .AI. Ask me anything, solve your homework, or request product recommendations!</div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="input-box">
                    <textarea id="user-input" rows="1" placeholder="Ask Nexus anything..."></textarea>
                    <button class="send-btn" id="send-btn">↑</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // PASTE YOUR GEMINI API KEY INSIDE THE QUOTES BELOW:
        const MASTER_API_KEY = "AQ.Ab8RN6I_PYu1igKW1mN_eZz3yIMTA4VsFHahRcAx0AQNDUXPkQ";

        const splashScreen = document.getElementById('splash-screen');
        const mainApp = document.getElementById('main-app');
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function enterApp() {
            splashScreen.style.opacity = '0';
            setTimeout(() => {
                splashScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                userInput.focus();
            }, 500);
        }

        function appendMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper', sender);

            const avatar = document.createElement('div');
            avatar.classList.add('msg-avatar');
            avatar.textContent = sender === 'user' ? 'U' : 'AI';

            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.textContent = text;

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function callGeminiAPI(prompt) {
            if (MASTER_API_KEY === "YOUR_ACTUAL_API_KEY_HERE") {
                appendMessage("Please update the MASTER_API_KEY in your code with your actual Gemini API key.", 'ai');
                return;
            }

            appendMessage("Thinking...", 'ai');
            const loadingMsg = chatMessages.lastChild;

            try {
                // Updated to the correct active endpoint model
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview:generateContent?key=${MASTER_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                chatMessages.removeChild(loadingMsg);

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    appendMessage(data.candidates[0].content.parts[0].text, 'ai');
                } else if (data.error) {
                    appendMessage("API Error: " + data.error.message, 'ai');
                } else {
                    appendMessage("Error receiving response from AI server.", 'ai');
                }
            } catch (error) {
                chatMessages.removeChild(loadingMsg);
                appendMessage("Network connection error.", 'ai');
            }
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';

            callGeminiAPI(text);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
